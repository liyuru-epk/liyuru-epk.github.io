<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人博客</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="glass-header">
        <h1><a href="index.html">个人博客</a></h1>
        <nav>
            <ul>
                <li><a href="#home">首页</a></li>
                <li><a href="#categories">分类</a></li>
                <li><a href="#about">关于</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home" class="full-screen">
            <div class="hero-content">
                <h2>分享思想，记录生活</h2>
                <p>欢迎来到我的个人博客</p>
            </div>
        </section>

        <section id="latest-posts" class="full-screen">
            <h2>最新文章</h2>
            <div class="posts-container" id="posts-container">
            </div>
        </section>

        <section id="categories" class="full-screen">
            <h2>文章分类</h2>
            <div class="categories-container" id="categories-container">
            </div>
        </section>

        <section id="about" class="full-screen">
            <div class="about-content glass-effect">
                <h2>关于我</h2>
                <p>我是Nero,一名普通男高</p>
                <p>喜欢干的事情很多也很杂</p>
            </div>
        </section>
    </main>

    <footer class="glass-footer">
        <p>&copy; 2026 个人博客</p>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
