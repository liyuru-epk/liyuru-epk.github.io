<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大家好啊我是Nero - 个人博客</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="glass-header">
        <h1><a href="index.html">个人博客</a></h1>
        <nav>
            <ul>
                <li><a href="index.html#home">首页</a></li>
                <li><a href="index.html#categories">分类</a></li>
                <li><a href="index.html#about">关于</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="post-content">
            <div class="post-container glass-effect">
                <h1>大家好啊我是Nero</h1>
                <p class="post-meta">分类：生活 | 日期：2026-04-19</p>
                <div class="post-body">
                    <p>大家好，我是Nero！欢迎来到我的个人博客。这个博客是我最近才创建的，创建的初衷其实很简单——就是好玩！</p>

                    <p>在创建这个博客的过程中，我花了不少时间思考要写些什么内容。然后我发现我完全不知道要写什么。</p>

                    <p>哎呀，有点难办呢。说点什么好呢？有了，结尾吧</p>

                    <p>最后，谢谢大家来看我的博客！希望你们能在这里找到一些有趣的内容。如果有什么想对我说的，可以在评论区留言，我会认真回复的。再次感谢大家的支持！</p>
                </div>
            </div>
        </section>

        <section id="comments">
            <div class="comments-container glass-effect">
                <h2>评论区</h2>
                <div class="comment-form">
                    <h3>发表评论</h3>
                    <form id="commentForm">
                        <div class="form-group">
                            <label for="name">昵称</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">邮箱</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="message">评论内容</label>
                            <textarea id="message" name="message" rows="5" required></textarea>
                        </div>
                        <button type="submit" class="submit-btn">提交评论</button>
                    </form>
                </div>
                <div class="comments-list">
                    <h3>评论列表</h3>
                    <div id="commentsContainer"></div>
                </div>
            </div>
        </section>

        <section id="related-posts">
            <h2>相关文章推荐</h2>
            <div class="posts-container" id="related-posts-container">
            </div>
        </section>
    </main>

    <footer class="glass-footer">
        <p>&copy; 2026 个人博客</p>
    </footer>

    <script src="data.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            loadRelatedArticles('post1', '#related-posts-container');
        });
    </script>
</body>
</html>
